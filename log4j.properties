# Log4j Configuration - External file (not in resources)
# Main logger configuration
log4j.rootLogger=INFO, console, mainFile

# Console appender with layout
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.Target=System.out
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%t] %c{1} - %m%n

# Main file appender
log4j.appender.mainFile=org.apache.log4j.RollingFileAppender
log4j.appender.mainFile.File=logs/p-<date>.log
log4j.appender.mainFile.MaxFileSize=10MB
log4j.appender.mainFile.MaxBackupIndex=5
log4j.appender.mainFile.layout=org.apache.log4j.PatternLayout
log4j.appender.mainFile.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%t] %c{1} - %m%n

# Thread-1 logger configuration
log4j.logger.Thread-1=INFO, thread1File
log4j.additivity.Thread-1=false
log4j.appender.thread1File=org.apache.log4j.RollingFileAppender
log4j.appender.thread1File.File=logs/p-<date>-1.log
log4j.appender.thread1File.MaxFileSize=10MB
log4j.appender.thread1File.MaxBackupIndex=5
log4j.appender.thread1File.layout=org.apache.log4j.PatternLayout
log4j.appender.thread1File.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%t] %c{1} - %m%n

# Thread-2 logger configuration
log4j.logger.Thread-2=INFO, thread2File
log4j.additivity.Thread-2=false
log4j.appender.thread2File=org.apache.log4j.RollingFileAppender
log4j.appender.thread2File.File=logs/p-<date>-2.log
log4j.appender.thread2File.MaxFileSize=10MB
log4j.appender.thread2File.MaxBackupIndex=5
log4j.appender.thread2File.layout=org.apache.log4j.PatternLayout
log4j.appender.thread2File.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%t] %c{1} - %m%n

# Thread-3 logger configuration
log4j.logger.Thread-3=INFO, thread3File
log4j.additivity.Thread-3=false
log4j.appender.thread3File=org.apache.log4j.RollingFileAppender
log4j.appender.thread3File.File=logs/p-<date>-3.log
log4j.appender.thread3File.MaxFileSize=10MB
log4j.appender.thread3File.MaxBackupIndex=5
log4j.appender.thread3File.layout=org.apache.log4j.PatternLayout
log4j.appender.thread3File.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%t] %c{1} - %m%n

# Disable verbose logging from other libraries
log4j.logger.org.apache.maven=WARN
log4j.logger.org.springframework=WARN